<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>안동헬기 근무현황</title>
<meta name="application-name" content="안동헬기 현황">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="안동헬기">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#b71c1c">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Share+Tech+Mono&display=swap');

:root {
  --bg:      #1c2333;
  --panel:   #242d40;
  --panel2:  #1e2739;
  --header:  #b71c1c;
  --accent:  #00e5c8;
  --accent2: #00b4a0;
  --red:     #e53935;
  --yellow:  #ffe57f;
  --white:   #f5f7fa;
  --border:  #2e3d57;
  --muted:   #7a90b0;
  --rowalt:  #1a2335;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 6px;
}

/* ── 카드: 뷰포트 높이에 딱 맞게 ── */
.card {
  width: 100%; max-width: 520px;
  height: 100vh;
  height: 100dvh;
  background: var(--panel);
  border-radius: 8px; overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  border: 1px solid var(--border);
  display: flex; flex-direction: column;
}

/* ── 제목 ── */
.title-bar {
  background: var(--header);
  text-align: center; padding: 7px 8px;
  border-bottom: 2px solid #ff5252; flex-shrink: 0;
}
.title-bar h1 {
  font-size: clamp(12px, 3.8vw, 16px);
  font-weight: 900; color: #fff; letter-spacing: 1px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── 동기화 ── */
.sync-bar {
  display: flex; align-items: center; gap: 5px;
  background: #111827; padding: 2px 8px;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.sync-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #374151; flex-shrink: 0; transition: background 0.3s;
}
.sync-dot.ok     { background: var(--accent); box-shadow: 0 0 5px var(--accent); }
.sync-dot.error  { background: var(--red); }
.sync-dot.loading{ background: var(--yellow); animation: blink 0.8s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.sync-text { font-size: 9px; color: var(--muted); font-family: 'Share Tech Mono', monospace; }
.sync-time { font-size: 9px; color: var(--muted); font-family: 'Share Tech Mono', monospace; margin-left: auto; }

/* ── 날짜 행 ── */
.date-row {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--panel2); padding: 3px 8px;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.date-part { display: flex; align-items: center; gap: 2px; font-family: 'Share Tech Mono', monospace; }
.dblk {
  background: #111827; color: var(--yellow);
  font-size: clamp(12px, 3.5vw, 14px); font-weight: bold;
  padding: 1px 4px; border-radius: 3px; border: 1px solid #374151;
  letter-spacing: 1px; min-width: 22px; text-align: center; display: inline-block;
}
.dsep { font-size: 10px; color: var(--muted); }
.dow-blk {
  background: var(--accent2); color: #0d1117;
  font-size: clamp(11px, 3vw, 13px); font-weight: 900;
  padding: 1px 6px; border-radius: 3px; margin-left: 2px;
}
.clock-part {
  font-family: 'Share Tech Mono', monospace;
  font-size: clamp(12px, 3.5vw, 14px); color: var(--accent);
  background: #111827; padding: 1px 6px;
  border-radius: 3px; border: 1px solid #374151; letter-spacing: 1px;
}

/* ── 일출일몰 행 ── */
.sun-row {
  display: flex; align-items: center; gap: 10px;
  background: var(--panel2); padding: 2px 8px;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.sun-item { display: flex; align-items: center; gap: 3px; }
.sun-lbl  { font-size: 10px; color: var(--accent); font-weight: 700; }
.sun-val  {
  background: #111827; color: var(--yellow);
  font-family: 'Share Tech Mono', monospace;
  font-size: clamp(12px, 3.5vw, 14px); font-weight: bold;
  padding: 1px 5px; border-radius: 3px; border: 1px solid #374151;
  letter-spacing: 1px; text-align: center;
}

/* ── 날씨 행 ── */
.weather-row {
  display: flex; align-items: center; gap: 6px;
  background: #111827; padding: 2px 8px;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.weather-icon { font-size: 14px; flex-shrink: 0; }
.weather-val  { font-family: 'Share Tech Mono', monospace; font-size: 12px; color: var(--yellow); font-weight: bold; }
.weather-lbl  { font-size: 9px; color: var(--muted); }
.weather-div  { color: var(--border); font-size: 10px; }

/* ── 근무자 테이블 ── */
.crew-wrap { flex: 1; overflow: hidden; display: flex; flex-direction: column; min-height: 0; }
.crew-table { width: 100%; border-collapse: collapse; height: 100%; }
.crew-table tr { border-bottom: 1px solid var(--border); }
.crew-table tr:last-child { border-bottom: none; }
.crew-table tr:nth-child(even) td.name-cell,
.crew-table tr:nth-child(even) td.sub-cell { background: var(--rowalt); }

td.role-cell {
  background: #1a2438; color: var(--accent);
  font-size: clamp(9px, 2.5vw, 11px); font-weight: 800;
  text-align: center; vertical-align: middle;
  width: 58px; padding: 2px 2px;
  border-right: 3px solid var(--red); line-height: 1.3; white-space: nowrap;
}
td.sub-cell {
  background: #1e2739; color: var(--accent);
  font-size: clamp(8px, 2.2vw, 10px); font-weight: 700;
  text-align: center; vertical-align: middle;
  width: 40px; padding: 1px 2px;
  border-right: 1px solid var(--border); line-height: 1.3; white-space: nowrap;
}
td.name-cell { padding: 2px 8px; vertical-align: middle; background: var(--panel); }
.name-text {
  font-size: clamp(14px, 4vw, 18px);
  font-weight: 900; color: var(--white); letter-spacing: 3px;
}
.name-empty { font-size: 10px; color: #374151; }

/* ── 출동/이송 ── */
.stats-wrap { border-top: 1px solid var(--border); flex-shrink: 0; }
.stats-header {
  display: grid; grid-template-columns: 58px 1fr 1fr 1fr 1fr;
  background: #111827; border-bottom: 1px solid var(--border);
}
.sh-cell {
  text-align: center; padding: 3px 2px;
  font-size: clamp(8px, 2.2vw, 10px); font-weight: 700;
  color: var(--accent); border-right: 1px solid var(--border);
}
.sh-cell:last-child { border-right: none; }
.stats-row {
  display: grid; grid-template-columns: 58px 1fr 1fr 1fr 1fr;
  border-bottom: 1px solid var(--border); background: var(--panel);
}
.stats-row:last-child { border-bottom: none; }
.stats-row:nth-child(odd) { background: var(--rowalt); }
.sl-cell {
  background: #1a2438; display: flex; align-items: center; justify-content: center;
  font-size: clamp(8px, 2.2vw, 10px); font-weight: 800; color: var(--accent);
  border-right: 3px solid var(--red); padding: 1px 2px; text-align: center;
}
.sn-cell {
  display: flex; align-items: center; justify-content: center;
  border-right: 1px solid var(--border); padding: 2px 1px;
}
.sn-cell:last-child { border-right: none; }
.snum {
  background: #111827; color: var(--yellow);
  font-family: 'Share Tech Mono', monospace;
  font-size: clamp(13px, 3.8vw, 18px); font-weight: bold;
  padding: 2px 4px; border-radius: 3px; border: 1px solid #374151;
  min-width: 0; width: 100%; text-align: center; cursor: pointer;
}
.snum:active { border-color: var(--accent); color: var(--accent); }

/* ── 하단 버튼 (카드 밖, 스크롤로 접근) ── */
.bottom-wrap {
  width: 100%; max-width: 520px;
  padding: 6px 0 4px;
}
.bottom-bar {
  display: flex; gap: 6px; margin-bottom: 4px;
}
.btn {
  display: flex; align-items: center; justify-content: center; gap: 4px;
  font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 700;
  padding: 10px 12px; border-radius: 6px; cursor: pointer;
  transition: all 0.2s; flex: 1; border: none;
}
.btn-capture { background: #1a1a3a; border: 1.5px solid #7c6af0; color: #a89cf0; }
.btn-admin   { background: #1a1010; border: 1.5px solid #4a2020; color: #e57373; }
.btn-admin.active { background: #2a1010; border-color: var(--red); color: var(--red); }

/* ── 관리자 패널 ── */
.admin-panel {
  display: none; background: #0d1117;
  border: 1.5px solid #2a3a2a; border-radius: 8px;
  padding: 8px; margin-bottom: 4px;
  width: 100%;
}
.admin-panel.open { display: block; }
.admin-title {
  font-size: 10px; color: var(--accent); font-weight: 700;
  margin-bottom: 6px; display: flex; align-items: center;
  justify-content: space-between; flex-wrap: wrap; gap: 3px;
}
.btn-excel {
  display: flex; align-items: center; justify-content: center; gap: 5px;
  background: #0d2a25; border: 1.5px solid var(--accent2); color: var(--accent);
  font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 700;
  padding: 10px 12px; border-radius: 6px; cursor: pointer; width: 100%;
}
.btn-excel input { display: none; }

.status-msg {
  width: 100%; font-size: 10px; color: var(--muted);
  font-family: 'Share Tech Mono', monospace;
  text-align: center; padding-bottom: 4px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── 모달 ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.75); z-index: 100;
  align-items: center; justify-content: center; backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--panel); border: 2px solid var(--accent2);
  border-radius: 10px; padding: 20px; width: 280px; max-width: 90vw;
}
.modal h3 { font-size: 13px; color: var(--accent); margin-bottom: 12px; font-weight: 800; }
.modal input {
  width: 100%; background: #111827; border: 1.5px solid #374151;
  border-radius: 6px; padding: 10px; color: var(--yellow);
  font-family: 'Share Tech Mono', monospace; font-size: 26px;
  outline: none; text-align: center; letter-spacing: 3px; font-weight: bold;
}
.modal input:focus { border-color: var(--accent); }
.modal-btns { display: flex; gap: 8px; margin-top: 14px; }
.mbtn { flex: 1; padding: 10px; border-radius: 6px; border: none; font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; }
.mbtn-ok     { background: var(--accent2); color: #0d1117; }
.mbtn-cancel { background: #1e2739; color: var(--muted); border: 1px solid var(--border); }
.modal-err   { font-size: 11px; color: var(--red); margin-top: 8px; text-align: center; display: none; }
</style>
</head>
<body>

<!-- 카드: 뷰포트 전체 채움 -->
<div class="card" id="mainCard">

  <div class="title-bar">
    <h1>안동병원 응급의료전용헬기 일일근무현황</h1>
  </div>

  <div class="sync-bar">
    <span class="sync-dot" id="syncDot"></span>
    <span class="sync-text" id="syncText">연결 중...</span>
    <span class="sync-time" id="syncTime"></span>
  </div>

  <!-- 날짜 + 시계 한 줄 -->
  <div class="date-row">
    <div class="date-part">
      <span class="dblk" id="dYear">----</span><span class="dsep">년</span>
      <span class="dblk" id="dMonth">--</span><span class="dsep">월</span>
      <span class="dblk" id="dDay">--</span><span class="dsep">일</span>
      <span class="dow-blk" id="dDow">-</span><span class="dsep" style="margin-left:2px;">요일</span>
    </div>
    <div class="clock-part" id="clockVal">--:--:--</div>
  </div>

  <!-- 일출 + 일몰 한 줄 -->
  <div class="sun-row">
    <div class="sun-item"><span class="sun-lbl">🌅 일출</span><span class="sun-val" id="sunriseVal">--:--</span></div>
    <div class="sun-item"><span class="sun-lbl">🌇 일몰</span><span class="sun-val" id="sunsetVal">--:--</span></div>
  </div>

  <!-- 날씨 -->
  <div class="weather-row">
    <div class="weather-icon" id="wxIcon">🌡️</div>
    <span class="weather-lbl">기온</span>
    <span class="weather-val" id="wxTemp">--°C</span>
    <span class="weather-div">|</span>
    <span class="weather-lbl">풍속</span>
    <span class="weather-val" id="wxWind">--m/s</span>
  </div>

  <!-- 근무자 -->
  <div class="crew-wrap">
    <table class="crew-table" id="crewTable"></table>
  </div>

  <!-- 출동/이송 -->
  <div class="stats-wrap">
    <div class="stats-header">
      <div class="sh-cell"></div>
      <div class="sh-cell">금 일</div>
      <div class="sh-cell">월합계</div>
      <div class="sh-cell">연 간</div>
      <div class="sh-cell">합 계</div>
    </div>
    <div class="stats-row">
      <div class="sl-cell">출동횟수</div>
      <div class="sn-cell"><div class="snum" id="d_today" onclick="adminAction('d_today')">0</div></div>
      <div class="sn-cell"><div class="snum" id="d_month" onclick="adminAction('d_month')">0</div></div>
      <div class="sn-cell"><div class="snum" id="d_year"  onclick="adminAction('d_year')">0</div></div>
      <div class="sn-cell"><div class="snum" id="d_total" onclick="adminAction('d_total')">0</div></div>
    </div>
    <div class="stats-row">
      <div class="sl-cell">이송현황</div>
      <div class="sn-cell"><div class="snum" id="t_today" onclick="adminAction('t_today')">0</div></div>
      <div class="sn-cell"><div class="snum" id="t_month" onclick="adminAction('t_month')">0</div></div>
      <div class="sn-cell"><div class="snum" id="t_year"  onclick="adminAction('t_year')">0</div></div>
      <div class="sn-cell"><div class="snum" id="t_total" onclick="adminAction('t_total')">0</div></div>
    </div>
  </div>
</div>

<!-- 버튼: 카드 아래 스크롤로 접근 -->
<div class="bottom-wrap">
  <div class="bottom-bar">
    <button class="btn btn-capture" onclick="saveImage()" id="captureBtn">📸 이미지 저장</button>
    <button class="btn btn-admin" id="adminToggle" onclick="toggleAdmin()">🔐 관리자</button>
  </div>
  <div class="admin-panel" id="adminPanel">
    <div class="admin-title">
      🔧 관리자 메뉴
      <span style="color:var(--muted);font-size:9px;">저장 시 팀원 전체에 즉시 반영</span>
    </div>
    <label class="btn-excel">
      📂 경북 EMS SKD 엑셀 불러오기
      <input type="file" id="skdFile" accept=".xlsx,.xls">
    </label>
  </div>
  <div class="status-msg" id="statusMsg">🔄 팀 공유 데이터 불러오는 중...</div>
</div>

<!-- 숫자 모달 -->
<div class="modal-overlay" id="numModal">
  <div class="modal">
    <h3 id="modalTitle">숫자 입력</h3>
    <input type="number" id="modalInput" min="0" placeholder="0">
    <div class="modal-btns">
      <button class="mbtn mbtn-cancel" onclick="closeModal('numModal')">취소</button>
      <button class="mbtn mbtn-ok" onclick="saveModal()">저장·전체반영</button>
    </div>
  </div>
</div>

<!-- 비밀번호 모달 -->
<div class="modal-overlay" id="pwModal">
  <div class="modal">
    <h3>🔐 관리자 비밀번호</h3>
    <input type="password" id="pwInput" placeholder="••••" maxlength="10">
    <div class="modal-err" id="pwErr">비밀번호가 틀렸습니다</div>
    <div class="modal-btns">
      <button class="mbtn mbtn-cancel" onclick="closeModal('pwModal')">취소</button>
      <button class="mbtn mbtn-ok" onclick="checkPw()">확인</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const ADMIN_PW = '1104';
const BIN_DATA = 'https://api.jsonbin.io/v3/b/69e81d2d36566621a8da87d4';
const BIN_SKD  = 'https://api.jsonbin.io/v3/b/69e8246baaba882197242a47';
const API_KEY  = '$2a$10$Vm7b.JqzMds/xDyWENfi4uhoyRiirFDyQufAZOwW1OZ7wOrT2HT.C';
const POLL_MS  = 15000;
const WX_URL   = 'https://api.open-meteo.com/v1/forecast?latitude=36.5684&longitude=128.7294&current=temperature_2m,wind_speed_10m,weather_code&wind_speed_unit=ms&timezone=Asia%2FSeoul';

let isAdmin=false, currentStatId='';
let crew    = {doctor:'',rescue:'',dispatch:'',captainAM:'',captainPM:'',copilot:'',mechanic:''};
let sunData = {rise:'--:--',set:'--:--'};
let stats   = {d_today:0,d_month:0,d_year:0,d_total:0,t_today:0,t_month:0,t_year:0,t_total:0};

function updateClock() {
  const now=new Date(), pad=n=>String(n).padStart(2,'0');
  document.getElementById('clockVal').textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  document.getElementById('dYear').textContent    = now.getFullYear();
  document.getElementById('dMonth').textContent   = pad(now.getMonth()+1);
  document.getElementById('dDay').textContent     = pad(now.getDate());
  const days=['일','월','화','수','목','금','토'];
  document.getElementById('dDow').textContent     = days[now.getDay()];
}
setInterval(updateClock,1000); updateClock();

function todayStr() {
  const now=new Date(),pad=n=>String(n).padStart(2,'0');
  return `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
}
function todayMonthDay() {
  const now=new Date(); return {month:now.getMonth()+1, day:now.getDate()};
}

const WX_ICON={0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌧️',61:'🌧️',63:'🌧️',65:'🌧️',71:'🌨️',73:'❄️',75:'❄️',80:'🌦️',81:'🌧️',82:'⛈️',95:'⛈️',96:'⛈️',99:'⛈️'};
async function fetchWeather() {
  try {
    const c=(await (await fetch(WX_URL)).json()).current;
    document.getElementById('wxTemp').textContent=`${c.temperature_2m.toFixed(1)}°C`;
    document.getElementById('wxWind').textContent=`${c.wind_speed_10m.toFixed(1)}m/s`;
    document.getElementById('wxIcon').textContent=WX_ICON[c.weather_code]||'🌡️';
  } catch(e){}
}
fetchWeather(); setInterval(fetchWeather,600000);

async function cloudGet() {
  try { const r=await fetch(BIN_DATA+'/latest',{headers:{'X-Master-Key':API_KEY}}); return r.ok?(await r.json()).record||null:null; } catch(e){return null;}
}
async function cloudSet(data) {
  try { return (await fetch(BIN_DATA,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},body:JSON.stringify(data)})).ok; } catch(e){return false;}
}
async function skdGet() {
  try { const r=await fetch(BIN_SKD+'/latest',{headers:{'X-Master-Key':API_KEY}}); return r.ok?(await r.json()).record?.skd||null:null; } catch(e){return null;}
}
async function skdSet(b64) {
  try { return (await fetch(BIN_SKD,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},body:JSON.stringify({skd:b64,updated:new Date().toISOString()})})).ok; } catch(e){return false;}
}

function fmtTime(v) {
  if(v===null||v===undefined) return '--:--';
  if(typeof v==='number'){const s=Math.round(v*86400);return `${String(Math.floor(s/3600)).padStart(2,'0')}:${String(Math.floor((s%3600)/60)).padStart(2,'0')}`;}
  return String(v).trim().substring(0,5);
}
function parseSKD(b64) {
  try {
    const bin=atob(b64),bytes=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
    const wb=XLSX.read(bytes,{type:'array',cellDates:false});
    const {month,day}=todayMonthDay();
    const names=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
    const ws=wb.Sheets[names[month-1]]||wb.Sheets[wb.SheetNames[0]];
    const usedSheet=wb.Sheets[names[month-1]]?names[month-1]:wb.SheetNames[0];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:null});
    for(let i=4;i<rows.length-1;i++){
      const main=rows[i],sub=rows[i+1],dv=main[0];
      if(dv===null||dv===undefined) continue;
      if(typeof dv==='string'&&dv.startsWith('=')) continue;
      if(typeof dv!=='number'||dv!==day) continue;
      sunData.rise=fmtTime(main[2]); sunData.set=fmtTime(main[3]);
      crew.doctor=main[4]||''; crew.rescue=main[5]||'';
      crew.captainAM=main[6]||''; crew.copilot=main[7]||'';
      crew.dispatch=main[8]||''; crew.mechanic=main[9]||'';
      if(sub&&sub[0]==null) crew.captainPM=sub[6]||'';
      return {found:true,usedSheet};
    }
    return {found:false,usedSheet};
  } catch(e){return {found:false,error:e.message};}
}

function renderCrew() {
  const nm=v=>v?`<span class="name-text">${v}</span>`:`<span class="name-empty">　　　</span>`;
  document.getElementById('crewTable').innerHTML=`
    <tr><td class="role-cell">탑승의사</td><td class="name-cell" colspan="2">${nm(crew.doctor)}</td></tr>
    <tr><td class="role-cell">구조사/<br>간호사</td><td class="name-cell" colspan="2">${nm(crew.rescue)}</td></tr>
    <tr><td class="role-cell">운항관리사</td><td class="name-cell" colspan="2">${nm(crew.dispatch)}</td></tr>
    <tr>
      <td class="role-cell" rowspan="3">운항승무원</td>
      <td class="sub-cell">기장오전</td><td class="name-cell">${nm(crew.captainAM)}</td>
    </tr>
    <tr><td class="sub-cell">기장오후</td><td class="name-cell">${nm(crew.captainPM)}</td></tr>
    <tr><td class="sub-cell">부기장</td><td class="name-cell">${nm(crew.copilot)}</td></tr>
    <tr><td class="role-cell">항공정비사</td><td class="name-cell" colspan="2">${nm(crew.mechanic)}</td></tr>`;

renderCrew();

function renderSun() {
  document.getElementById('sunriseVal').textContent=sunData.rise;
  document.getElementById('sunsetVal').textContent=sunData.set;
}
function applyStats() {
  Object.keys(stats).forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=stats[id]||0;});
}
function setSyncState(s,t) {
  document.getElementById('syncDot').className='sync-dot '+s;
  document.getElementById('syncText').textContent=t;
}

async function loadFromCloud() {
  setSyncState('loading','동기화 중...');
  try {
    const data=await cloudGet();
    const isNewDay=!data?.savedDate||data.savedDate!==todayStr();
    if(data&&!isNewDay){
      crew=data.crew||crew; sunData=data.sunData||sunData; stats=data.stats||stats;
      applyStats(); renderCrew(); renderSun();
      setSyncState('ok','팀 공유 · 실시간 연동');
      const now=new Date(),pad=n=>String(n).padStart(2,'0');
      document.getElementById('syncTime').textContent=`${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())} 기준`;
      setStatus('✅ 데이터 로드 완료');
    } else {
      if(data?.stats){stats={...data.stats,d_today:0,t_today:0};applyStats();}
      setSyncState('loading','SKD 자동 로딩 중...');
      setStatus('📅 날짜가 바뀌었습니다. SKD에서 오늘 근무자를 불러옵니다...');
      const b64=await skdGet();
      if(b64){
        const {found,usedSheet,error}=parseSKD(b64);
        if(found){
          renderCrew(); renderSun(); await saveToCloud();
          setSyncState('ok','팀 공유 · 실시간 연동');
          const {month,day}=todayMonthDay();
          setStatus(`✅ ${month}월 ${day}일 근무자 자동 반영 완료!`);
        } else {
          setSyncState('ok','날짜 없음');
          setStatus(error?`❌ SKD 오류: ${error}`:'⚠️ SKD에 오늘 날짜가 없습니다. 관리자가 엑셀을 업로드해 주세요.');
          renderCrew(); renderSun();
        }
      } else {
        setSyncState('ok','SKD 없음');
        setStatus('ℹ️ 관리자가 SKD 엑셀을 한 번 업로드해 주세요.');
        renderCrew(); renderSun();
      }
    }
  } catch(e){setSyncState('error','연결 오류');setStatus('❌ 로드 실패: '+e.message);}
}

async function saveToCloud() {
  setSyncState('loading','저장 중...');
  const ok=await cloudSet({crew,sunData,stats,savedDate:todayStr()});
  if(ok){
    setSyncState('ok','팀 공유 · 실시간 연동');
    const now=new Date(),pad=n=>String(n).padStart(2,'0');
    document.getElementById('syncTime').textContent=`${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())} 저장`;
    setStatus('✅ 저장 완료 — 팀원 화면에 즉시 반영됩니다');
  } else {setSyncState('error','저장 실패');setStatus('❌ 저장 실패');}
}

function toggleAdmin() {
  if(isAdmin){
    isAdmin=false;
    document.getElementById('adminPanel').classList.remove('open');
    document.getElementById('adminToggle').classList.remove('active');
    document.getElementById('adminToggle').textContent='🔐 관리자';
  } else {
    document.getElementById('pwErr').style.display='none';
    document.getElementById('pwInput').value='';
    document.getElementById('pwModal').classList.add('open');
    setTimeout(()=>document.getElementById('pwInput').focus(),100);
  }
}
function checkPw() {
  if(document.getElementById('pwInput').value===ADMIN_PW){
    isAdmin=true; closeModal('pwModal');
    document.getElementById('adminPanel').classList.add('open');
    document.getElementById('adminToggle').classList.add('active');
    document.getElementById('adminToggle').textContent='🔓 관리자 ON';
    setStatus('✅ 관리자 모드');
  } else {document.getElementById('pwErr').style.display='block';}
}
function adminAction(id) {
  if(!isAdmin){setStatus('🔐 수정하려면 관리자 버튼을 눌러 로그인하세요');return;}
  currentStatId=id;
  const labels={d_today:'출동횟수-금일',d_month:'출동횟수-월합계',d_year:'출동횟수-연간합계',d_total:'출동횟수-합계',t_today:'이송현황-금일',t_month:'이송현황-월합계',t_year:'이송현황-연간합계',t_total:'이송현황-합계'};
  document.getElementById('modalTitle').textContent=labels[id]||id;
  document.getElementById('modalInput').value=stats[id]||0;
  document.getElementById('numModal').classList.add('open');
  setTimeout(()=>document.getElementById('modalInput').select(),50);
}
async function saveModal() {
  stats[currentStatId]=parseInt(document.getElementById('modalInput').value)||0;
  document.getElementById(currentStatId).textContent=stats[currentStatId];
  closeModal('numModal'); await saveToCloud();
}

document.getElementById('skdFile').addEventListener('change',function(e){
  if(!isAdmin){setStatus('🔐 관리자만 가능합니다');return;}
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=async function(ev){
    try{
      const uint8=new Uint8Array(ev.target.result);
      const wb=XLSX.read(uint8,{type:'array',cellDates:false});
      const {month,day}=todayMonthDay();
      const names=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
      const ws=wb.Sheets[names[month-1]]||wb.Sheets[wb.SheetNames[0]];
      const usedSheet=wb.Sheets[names[month-1]]?names[month-1]:wb.SheetNames[0];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:null});
      let found=false;
      for(let i=4;i<rows.length-1;i++){
        const main=rows[i],sub=rows[i+1],dv=main[0];
        if(dv===null||dv===undefined) continue;
        if(typeof dv==='string'&&dv.startsWith('=')) continue;
        if(typeof dv!=='number'||dv!==day) continue;
        sunData.rise=fmtTime(main[2]); sunData.set=fmtTime(main[3]);
        crew.doctor=main[4]||''; crew.rescue=main[5]||'';
        crew.captainAM=main[6]||''; crew.copilot=main[7]||'';
        crew.dispatch=main[8]||''; crew.mechanic=main[9]||'';
        if(sub&&sub[0]==null) crew.captainPM=sub[6]||'';
        found=true; break;
      }
      renderCrew(); renderSun();
      setStatus('☁️ SKD 서버 저장 중...');
      let b64='';
      for(let i=0;i<uint8.length;i+=8192) b64+=String.fromCharCode(...uint8.slice(i,i+8192));
      const skdSaved=await skdSet(btoa(b64));
      await saveToCloud();
      setStatus(found
        ?`✅ ${month}월 ${day}일 완료 · ${skdSaved?'SKD 저장됨 · 매일 자동 반영!':'SKD 저장 실패'} (${usedSheet})`
        :`⚠️ ${month}월 ${day}일 데이터 없음 (${usedSheet})`);
    } catch(err){setStatus('❌ 파일 오류: '+err.message);}
  };
  reader.readAsArrayBuffer(file); this.value='';
});

async function saveImage() {
  const btn=document.getElementById('captureBtn');
  btn.textContent='⏳ 저장 중...'; btn.disabled=true;
  try{
    const canvas=await html2canvas(document.getElementById('mainCard'),{backgroundColor:'#1c2333',scale:2,useCORS:true,logging:false});
    const now=new Date(),pad=n=>String(n).padStart(2,'0');
    const fname=`${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}_안동헬기현황.png`;
    const a=document.createElement('a'); a.download=fname; a.href=canvas.toDataURL('image/png'); a.click();
    setStatus(`✅ ${fname} 저장 완료 — 카톡에 바로 올리세요!`);
  } catch(e){setStatus('❌ 저장 실패: '+e.message);}
  finally{btn.textContent='📸 이미지 저장'; btn.disabled=false;}
}

function closeModal(id){document.getElementById(id).classList.remove('open');}
document.getElementById('numModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal('numModal');});
document.getElementById('pwModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal('pwModal');});
document.getElementById('modalInput').addEventListener('keydown',e=>{if(e.key==='Enter')saveModal();});
document.getElementById('pwInput').addEventListener('keydown',e=>{if(e.key==='Enter')checkPw();});

function setStatus(msg){
  document.getElementById('statusMsg').textContent=msg;
  setTimeout(()=>{document.getElementById('statusMsg').textContent='🔄 자동 갱신 중 (15초마다)';},6000);
}

function scheduleAutoRefreshAtMidnight(){
  const now=new Date(),next=new Date(now);
  next.setHours(24,0,10,0);
  setTimeout(async()=>{
    setStatus('🌙 자정 — 오늘 근무자를 자동으로 불러옵니다...');
    await loadFromCloud();
    scheduleAutoRefreshAtMidnight();
  },next-now);
}

loadFromCloud();
setInterval(loadFromCloud,POLL_MS);
scheduleAutoRefreshAtMidnight();
